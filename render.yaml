services:
  # Kiraaya Backend API (Render Web Service)
  - type: web
    name: kiraaya-api
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/backend/Dockerfile
    plan: free # or starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kiraaya-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: kiraaya-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false

    healthCheckPath: /api/v1/health
  # Kiraaya Landlord Portal
  - type: web
    name: kiraaya-landlord
    runtime: docker
    dockerContext: .
    dockerfilePath: apps/landlord-portal/Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: kiraaya-api
          property: url

  # Redis for Caching
  - type: redis
    name: kiraaya-redis
    plan: free
    ipAllowList: [] # Only allow internal connections

databases:
  - name: kiraaya-db
    plan: free
    databaseName: kiraaya
    user: kiraaya_admin
