services:
  # Backend API (Next.js)
  - type: web
    name: kiraaya-api
    runtime: node
    region: singapore
    plan: free
    rootDir: apps/backend
    buildCommand: "cd ../.. && npm install --ignore-scripts && npx prisma generate --schema=packages/db/prisma/schema.prisma && npx turbo build --filter=@kiraaya/api..."
    startCommand: "node apps/backend/.next/standalone/apps/backend/server.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: kiraaya-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: NEXT_PUBLIC_API_URL
        value: https://kiraaya-api.onrender.com

databases:
  - name: kiraaya-db
    plan: free
    region: singapore
    databaseName: kiraaya
    user: kiraaya_user
